name: Clan Treasury Level 4 CI

on:
  push:
    branches:
      - main
      - level-4-upgrade
  pull_request:
    branches:
      - main

jobs:
  contract-validation:
    name: Smart Contract CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check smart contract for WASM target
        run: cargo check --workspace --target wasm32v1-none

      - name: Run smart contract tests
        run: cargo test --workspace

      - name: Build contract WASM release
        run: cargo build --workspace --target wasm32v1-none --release

  frontend-validation:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --audit=false --fund=false

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

  backend-validation:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci --audit=false --fund=false

      - name: Type-check backend
        run: npm run type-check

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test

  cd-config-validation:
    name: Deployment Config Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify deployment and documentation files exist
        run: |
          test -f vercel.json
          test -f railway.toml
          test -f Procfile
          test -f scripts/deploy-and-save.ps1
          test -f scripts/verify-level4.ps1
          test -f README.md
          test -f docs/ARCHITECTURE.md
          test -f docs/FRONTEND_CONTRACT_INTEGRATION.md
          test -f docs/QUALITY_AND_DEPLOYMENT.md
